worker_processes auto;
rtmp_auto_push on;
events { worker_connections 1024; }

rtmp {
  server {
    listen 1935;
    chunk_size 4096;

    # OBS publishes here:  rtmp://YOUR_SERVER/live/<STREAM CODE>
    application live {
      live on;

      # ---- record every service, then hand off for archiving ----
      record all;
      record_path /recordings/raw;
      record_suffix -%Y-%m-%d-%H%M.flv;
      record_unique off;
      exec_record_done bash /scripts/postprocess.sh $path $basename;

      # ---- transcode to a light ladder + a separate audio-only rendition ----
      # Few viewers on weak networks: 360p video + ~48kbps audio-only.
      exec ffmpeg -i rtmp://localhost:1935/live/$name
        -c:v libx264 -preset veryfast -tune zerolatency -profile:v baseline
          -x264opts "keyint=48:min-keyint=48:no-scenecut"
          -b:v 500k -maxrate 550k -bufsize 1000k -s 640x360 -r 24
          -c:a aac -b:a 64k -ac 1 -f flv rtmp://localhost:1935/hls/${name}_360
        -vn -c:a aac -b:a 48k -ac 1
          -f flv rtmp://localhost:1935/hls/${name}_audio;
    }

    application hls {
      live on;
      hls on;
      hls_path /tmp/hls;
      hls_fragment 4s;
      hls_playlist_length 24s;
      hls_variant _360 BANDWIDTH=620000,RESOLUTION=640x360;
      hls_variant _audio BANDWIDTH=64000,CODECS="mp4a.40.2";
    }
  }
}

http {
  include mime.types;
  default_type application/octet-stream;
  sendfile on;

  # node backend (comments + recordings API)
  upstream api { server api:3000; }

  server {
    listen 8080;

    # live HLS (video master + audio-only rendition)
    location /hls {
      types { application/vnd.apple.mpegurl m3u8; video/mp2t ts; }
      root /tmp;
      add_header Cache-Control no-cache always;
      add_header Access-Control-Allow-Origin * always;
    }

    # recorded services (public archive files)
    location /vod {
      alias /recordings/vod;
      types { application/vnd.apple.mpegurl m3u8; video/mp2t ts; video/mp4 mp4; }
      add_header Access-Control-Allow-Origin * always;
    }

    # comment + archive API -> node
    location /api/ {
      proxy_pass http://api;
      proxy_set_header Host $host;
    }

    # streamer comment feed (websocket) -> node
    location /ws {
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 3600s;
    }

    # (optional) host the app itself
    location / { root /www; index index.html; }
  }
}
